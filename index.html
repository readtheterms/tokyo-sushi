<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tokyo Sushi — Redlands | Menu, Hours & Location</title>
  <meta name="description" content="Tokyo Sushi in Redlands, CA. View our full, up-to-date menu, hours, phone number, and location. Fresh sushi and Japanese cuisine." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Noto+Serif+JP:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ===================== HEADER / NAV ===================== -->
  <header class="site-header">
    <div class="container nav">
      <a href="#top" class="brand">
        <span class="wordmark" id="brand-name">Tokyo Sushi</span>
      </a>
      <nav class="nav-links">
        <a href="#menu">Menu</a>
        <a href="#hours">Hours</a>
        <a href="#location">Location</a>
        <a href="#" class="btn btn-call" id="nav-call">Call</a>
      </nav>
    </div>
  </header>

  <!-- ===================== HERO ===================== -->
  <section class="hero" id="top">
    <div class="container hero-inner">
      <p class="hero-kicker">Redlands, California</p>
      <h1 class="hero-title wordmark" id="hero-name">Tokyo Sushi</h1>
      <p class="hero-tagline" id="hero-tagline">Fresh Japanese cuisine &amp; sushi</p>
      <div class="hero-phone-block">
        <span class="hero-call-label">Call us to order</span>
        <a class="hero-phone" id="hero-phone" href="#"></a>
      </div>
    </div>
  </section>

  <!-- ===================== MENU ===================== -->
  <main class="container">
    <section id="menu" class="section">
      <h2 class="section-title">Our Menu</h2>
      <div id="menu-root" class="menu-grid"><!-- menu is inserted here by app.js --></div>
    </section>

    <!-- ===================== HOURS ===================== -->
    <section id="hours" class="section">
      <h2 class="section-title">Hours</h2>
      <table class="hours-table" id="hours-root"><!-- hours inserted by app.js --></table>
    </section>

    <!-- ===================== LOCATION / CONTACT ===================== -->
    <section id="location" class="section">
      <h2 class="section-title">Find Us</h2>
      <div class="contact-grid">
        <div class="contact-card">
          <h3>Address</h3>
          <p id="address-text"></p>
        </div>
        <div class="contact-card">
          <h3>Phone</h3>
          <p><a id="phone-link" class="phone-big"></a></p>
          <p class="muted">Call us to place an order or ask about specials.</p>
          <div class="socials" id="socials-root"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- ===================== FOOTER ===================== -->
  <footer class="site-footer">
    <div class="container">
      <p><span class="wordmark" id="footer-name">Tokyo Sushi</span></p>
      <p class="muted" id="footer-address"></p>
      <div class="socials" id="footer-socials"></div>
      <p class="muted">&copy; <span id="year"></span> Tokyo Sushi, Redlands CA.</p>
    </div>
  </footer>

  <script src="menu-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
